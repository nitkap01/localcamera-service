# Portainer stack for the localcamera-service viewer.
# Paste into Portainer > Stacks > Add stack, edit the image + CAMERA_IP, deploy.
#
# WebRTC needs go2rtc to advertise an IP your phone can reach. Pick ONE option:
#
# ── Option A: host networking (simplest — Linux Docker host only) ─────────────
# go2rtc sees the host's real LAN IP, so WebRTC "just works". Does NOT work on
# Docker Desktop for Mac/Windows (host mode isn't real there — use Option B).
services:
  localcamera-viewer:
    image: nitinkapoor/localcamera-viewer:v3   # <-- bump the tag per build; Portainer caches :latest
    container_name: localcamera-viewer
    network_mode: host
    environment:
      CAMERA_IP: "192.168.0.143"   # <-- REQUIRED: your camera's LAN IP
      DETECTOR: "cocossd"          # detection engine: cocossd | yolo (also switchable in the People tab)
    volumes:
      - lcs-data:/data             # people-count history (SQLite) — survives redeploys
    restart: unless-stopped

volumes:
  lcs-data:

# ── Option B: bridge networking (Docker Desktop, or if you can't use host) ────
# Publish the three ports AND tell go2rtc the host's LAN IP so phones can reach
# the WebRTC media. Without WEBRTC_CANDIDATE, mobile falls back to slow MJPEG.
#
# services:
#   localcamera-viewer:
#     image: nitinkapoor/localcamera-viewer:latest
#     container_name: localcamera-viewer
#     ports:
#       - "8080:8080"          # web UI
#       - "1984:1984"          # go2rtc API / WebRTC signaling
#       - "8555:8555"          # WebRTC media (tcp)
#       - "8555:8555/udp"      # WebRTC media (udp)
#     environment:
#       CAMERA_IP: "192.168.0.143"
#       WEBRTC_CANDIDATE: "192.168.0.10:8555"   # <-- the DOCKER HOST's LAN IP
#     volumes:
#       - lcs-data:/data
#     restart: unless-stopped
