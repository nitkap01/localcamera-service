<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>nk-camera</title>
<style>
  :root { --bg:#0d0f12; --panel:#171a1f; --line:#262b33; --fg:#e7ebf0; --mut:#8b95a3;
          --accent:#3da2ff; --rec:#ff4d4d; --ok:#38d39f; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  body { display:flex; flex-direction:column; }
  header { display:flex; align-items:center; gap:8px; padding:10px 14px; border-bottom:1px solid var(--line); }
  header h1 { font-size:15px; margin:0; font-weight:600; letter-spacing:.02em; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--mut); }
  .dot.live { background:var(--ok); box-shadow:0 0 8px var(--ok); }
  .dot.err { background:var(--rec); }
  header .meta { margin-left:auto; color:var(--mut); font-size:12px; }
  .stage { position:relative; flex:1; min-height:0; display:flex; align-items:center; justify-content:center; background:#000; overflow:hidden; }
  #stage { display:flex; align-items:center; justify-content:center; width:100%; height:100%; }
  #stage video, #stage img, #stage video-stream { max-width:100%; max-height:100%; object-fit:contain; background:#000; }
  #stage video, #stage img { cursor:pointer; }
  /* hide the go2rtc <video> native controls (WebKit) so it's a clean, tap-to-fullscreen surface */
  #stage video::-webkit-media-controls,
  #stage video::-webkit-media-controls-enclosure,
  #stage video::-webkit-media-controls-panel { display:none !important; -webkit-appearance:none; }
  .cover #stage video, .cover #stage img, .cover #stage video-stream { width:100%; height:100%; object-fit:cover; }
  .badge { position:absolute; top:10px; left:10px; background:rgba(0,0,0,.55); padding:3px 9px; border-radius:999px; font-size:11px; color:var(--mut); letter-spacing:.04em; max-width:80%; }
  .recbadge { position:absolute; top:10px; right:10px; display:none; align-items:center; gap:6px; background:rgba(0,0,0,.6); padding:4px 10px; border-radius:999px; font-size:12px; color:#fff; }
  .recbadge.on { display:flex; }
  .recbadge .dot { background:var(--rec); animation:blink 1s infinite; }
  @keyframes blink { 50%{opacity:.25} }
  .bar { display:flex; flex-wrap:wrap; gap:8px; padding:12px; border-top:1px solid var(--line); background:var(--panel); justify-content:center; }
  button, select { font:inherit; color:var(--fg); background:#20242b; border:1px solid var(--line); border-radius:10px; padding:10px 13px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
  button:active { transform:translateY(1px); }
  button.primary { background:var(--accent); border-color:var(--accent); color:#04121f; font-weight:600; }
  button.rec { background:var(--rec); border-color:var(--rec); color:#2a0000; font-weight:600; }
  button.on { outline:2px solid var(--accent); background:#233; }
  .grp { display:flex; gap:6px; align-items:center; background:#14171c; padding:5px; border-radius:12px; border:1px solid var(--line); }
  .grp small { color:var(--mut); padding:0 4px; }
  /* adjust panel */
  .adjust { display:none; gap:18px; flex-wrap:wrap; padding:14px 16px; border-top:1px solid var(--line); background:#12151a; justify-content:center; }
  .adjust.open { display:flex; }
  .slider { display:flex; flex-direction:column; gap:4px; min-width:140px; }
  .slider label { font-size:12px; color:var(--mut); display:flex; justify-content:space-between; }
  .slider input[type=range] { width:100%; accent-color:var(--accent); }
  @media (max-width:520px){ button,select{ padding:9px 11px; } header .meta{ display:none; } .slider{ min-width:44%; } }
  /* tabs + people view */
  .tabs { display:flex; gap:6px; padding:8px 12px; background:var(--panel); border-bottom:1px solid var(--line); }
  .tabs button { background:transparent; border:1px solid transparent; color:var(--mut); border-radius:9px; padding:7px 16px; }
  .tabs button.on { color:var(--fg); background:#20242b; border-color:var(--line); }
  #liveview { flex:1; min-height:0; display:flex; flex-direction:column; }
  #peopleview { flex:1; min-height:0; overflow:auto; display:flex; flex-direction:column; gap:16px; padding:18px; }
  #liveview[hidden], #peopleview[hidden] { display:none; }
  .bigcount { display:flex; align-items:baseline; gap:12px; }
  .bigcount .num { font-size:64px; font-weight:700; line-height:1; color:var(--fg); font-variant-numeric:tabular-nums; }
  .bigcount .num.live { color:var(--ok); }
  .bigcount .lbl { color:var(--mut); }
  .statrow { display:flex; gap:22px; align-items:center; color:var(--mut); font-size:13px; flex-wrap:wrap; }
  .statrow b { color:var(--fg); font-size:17px; }
  .chartwrap { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; }
  .chartwrap svg { width:100%; height:auto; display:block; }
  .enginerow { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .enginerow small { color:var(--mut); }
  .ebtn:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>
  <header>
    <span id="status" class="dot"></span>
    <h1>nk-camera</h1>
    <span class="meta" id="meta"></span>
  </header>

  <div class="tabs">
    <button data-tab="live" class="on">📺 Live</button>
    <button data-tab="people">👥 People</button>
  </div>

  <div id="liveview">
  <div class="stage" id="stagewrap">
    <div id="stage"></div>
    <div class="badge" id="badge"></div>
    <div class="recbadge" id="recbadge"><span class="dot"></span><span id="rectime">REC</span></div>
  </div>

  <div class="adjust" id="adjust">
    <div class="slider"><label>Brightness <span id="bV">100%</span></label><input id="b" type="range" min="0.4" max="1.6" step="0.02" value="1"></div>
    <div class="slider"><label>Contrast <span id="cV">100%</span></label><input id="c" type="range" min="0.4" max="1.6" step="0.02" value="1"></div>
    <div class="slider"><label>Saturation <span id="sV">100%</span></label><input id="s" type="range" min="0" max="2" step="0.02" value="1"></div>
    <div class="slider"><label>Hue <span id="hV">0°</span></label><input id="hue" type="range" min="-180" max="180" step="2" value="0"></div>
    <button id="resetadj">↺ Reset</button>
  </div>

  <div class="bar">
    <div class="grp">
      <small>live</small>
      <button data-mode="rtc" class="mbtn on">⚡ WebRTC</button>
      <button data-mode="mjpeg" class="mbtn">🎞 MJPEG</button>
    </div>
    <button class="primary" id="snap">📷 Snapshot</button>
    <div class="grp">
      <button class="rec" id="rec">⏺ Record</button>
      <select id="dur" title="length"><option value="10">10s</option><option value="15" selected>15s</option><option value="30">30s</option><option value="60">60s</option></select>
    </div>
    <div class="grp">
      <small>res</small>
      <button data-q="hd" class="qbtn on">HD</button>
      <button data-q="sd" class="qbtn">SD</button>
    </div>
    <button id="adjbtn">🎚 Adjust</button>
    <button id="rotate">⟳ Rotate</button>
    <button id="mirror">⇄ Mirror</button>
    <button id="logo">🚫 Hide YI</button>
    <button id="fit">⤢ Fit</button>
    <button id="full">⛶ Fullscreen</button>
  </div>
  </div><!-- /liveview -->

  <div id="peopleview" hidden>
    <div class="bigcount"><span class="num" id="pcount">–</span><span class="lbl">people in frame now</span></div>
    <div class="statrow">
      <div>peak <b id="ppeak">–</b></div>
      <div>avg <b id="pavg">–</b></div>
      <div>samples <b id="psamples">–</b></div>
    </div>
    <div class="grp" style="align-self:flex-start">
      <small>range</small>
      <button data-range="hour" class="rbtn on">Hour</button>
      <button data-range="day" class="rbtn">Day</button>
      <button data-range="week" class="rbtn">Week</button>
    </div>
    <div class="enginerow">
      <div class="grp">
        <small>engine</small>
        <button data-engine="cocossd" class="ebtn">coco-ssd</button>
        <button data-engine="yolo" class="ebtn">YOLO</button>
      </div>
      <small id="enote"></small>
    </div>
    <div class="chartwrap"><div id="chart"></div></div>
  </div>

<script type="module">
  import { VideoRTC } from './video-rtc.js';
  if (!customElements.get('video-stream')) customElements.define('video-stream', VideoRTC);

  const state = { mode:'rtc', q:'hd', rot:0, mirror:false, hidelogo:false, cover:false, b:1, c:1, s:1, hue:0 };
  let go2rtcPort = 1984;
  const stage = document.getElementById('stage');
  const statusDot = document.getElementById('status');
  const badge = document.getElementById('badge');
  const el = () => stage.firstElementChild;

  // SD + hide-YI need our ffmpeg (transcode) → force MJPEG (WebRTC is raw passthrough)
  function coerceMode() {
    if ((state.q === 'sd' || state.hidelogo) && state.mode === 'rtc') state.mode = 'mjpeg';
    document.querySelectorAll('.mbtn').forEach(b => b.classList.toggle('on', b.dataset.mode === state.mode));
  }
  // rotate/mirror/colour are applied live via CSS (instant, both engines); server bakes them into captures.
  function applyCss() {
    const m = el(); if (!m) return;
    m.style.transform = `rotate(${state.rot}deg)` + (state.mirror ? ' scaleX(-1)' : '');
    m.style.filter = `brightness(${state.b}) contrast(${state.c}) saturate(${state.s}) hue-rotate(${state.hue}deg)`;
  }
  const capParams = () => `q=${state.q}&rot=${state.rot}&mirror=${state.mirror?1:0}&hidelogo=${state.hidelogo?1:0}`
    + `&b=${state.b}&c=${state.c}&s=${state.s}&hue=${state.hue}`;

  let rtcTimer = null;
  function showTransport(v) {              // report the transport that ACTUALLY connected
    const vid = v.querySelector('video');
    let t = 'MJPEG';
    if (vid && vid.srcObject) t = 'WebRTC';
    else if (vid && typeof vid.src === 'string' && vid.src.startsWith('blob:')) t = 'MSE';
    badge.textContent = `${t} · ${state.q.toUpperCase()}`
      + (state.rot ? ` · ${state.rot}°` : '') + (state.mirror ? ' · mir' : '')
      + (state.hidelogo ? ' · no-YI' : '');
  }
  // Watch the go2rtc player: mark "live" only on real playback, show the real
  // transport, and if nothing plays within a few seconds fall back to MJPEG so
  // the screen isn't just black.
  function watchRtc(v) {
    clearInterval(rtcTimer);
    const t0 = Date.now();
    rtcTimer = setInterval(() => {
      const vid = v.querySelector('video');
      if (vid && !vid.dataset.wired) {
        vid.dataset.wired = '1';
        vid.controls = false;                        // no go2rtc native player UI
        vid.style.cursor = 'pointer';
        vid.addEventListener('click', goFullscreen);  // click the video → fullscreen
        vid.addEventListener('playing', () => { statusDot.className = 'dot live'; showTransport(v); });
        vid.addEventListener('waiting', () => { if (statusDot.className === 'dot live') statusDot.className = 'dot'; });
        vid.addEventListener('error', () => { statusDot.className = 'dot err'; });
      }
      if (vid && vid.readyState >= 3 && !vid.paused) { clearInterval(rtcTimer); rtcTimer = null; }
      else if (Date.now() - t0 > 9000) {
        clearInterval(rtcTimer); rtcTimer = null;
        if (state.mode === 'rtc') { state.mode = 'mjpeg'; render(); badge.textContent = 'WebRTC/MSE unavailable → MJPEG'; }
      }
    }, 300);
  }

  function render() {                     // (re)build the live stream element
    clearInterval(rtcTimer); rtcTimer = null;
    coerceMode();
    stage.innerHTML = '';
    statusDot.className = 'dot';
    if (state.mode === 'rtc') {
      const v = document.createElement('video-stream');
      v.mode = 'webrtc,mse,mjpeg';
      stage.appendChild(v);
      v.src = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.hostname}:${go2rtcPort}/api/ws?src=nk-camera`;
      statusDot.className = 'dot';          // grey "connecting" until real playback starts
      watchRtc(v);
    } else {
      const img = document.createElement('img');   // server does SD + hide-YI; CSS does rotate/mirror/colour
      img.style.cursor = 'pointer';
      img.onclick = goFullscreen;                   // click the image → fullscreen
      img.onload = () => statusDot.className = 'dot live';
      img.onerror = () => { statusDot.className = 'dot err'; setTimeout(render, 1500); };
      img.src = `/stream.mjpeg?q=${state.q}&hidelogo=${state.hidelogo?1:0}&_=${Date.now()}`;
      stage.appendChild(img);
    }
    applyCss();
    badge.textContent = `${state.mode==='rtc'?'WebRTC':'MJPEG'} · ${state.q.toUpperCase()}`
      + (state.rot?` · ${state.rot}°`:'') + (state.mirror?' · mir':'') + (state.hidelogo?' · no-YI':'');
  }

  // capture (server ffmpeg, honours every setting incl. colour)
  document.getElementById('snap').onclick = () => {
    const a = document.createElement('a');
    a.href = `/snapshot.jpg?${capParams()}&download=1&_=${Date.now()}`;
    a.download = `nk-camera_${Date.now()}.jpg`; document.body.appendChild(a); a.click(); a.remove();
  };
  const recBadge = document.getElementById('recbadge'), recTime = document.getElementById('rectime');
  document.getElementById('rec').onclick = () => {
    const secs = parseInt(document.getElementById('dur').value, 10);
    const a = document.createElement('a');
    a.href = `/record?seconds=${secs}&${capParams()}&_=${Date.now()}`;
    a.download = `nk-camera_${Date.now()}_${secs}s.mp4`; document.body.appendChild(a); a.click(); a.remove();
    let left = secs; recBadge.classList.add('on'); recTime.textContent = 'REC ' + left + 's';
    const t = setInterval(() => { left--; recTime.textContent = 'REC ' + left + 's';
      if (left <= 0) { clearInterval(t); recBadge.classList.remove('on'); } }, 1000);
  };

  document.querySelectorAll('.mbtn').forEach(b => b.onclick = () => { state.mode = b.dataset.mode; render(); });
  document.querySelectorAll('.qbtn').forEach(b => b.onclick = () => {
    state.q = b.dataset.q; document.querySelectorAll('.qbtn').forEach(x => x.classList.toggle('on', x === b)); render(); });
  document.getElementById('rotate').onclick = () => { state.rot = (state.rot + 90) % 360; applyCss(); updateBadge(); };
  document.getElementById('mirror').onclick = (e) => { state.mirror = !state.mirror; e.currentTarget.classList.toggle('on', state.mirror); applyCss(); updateBadge(); };
  document.getElementById('logo').onclick = (e) => { state.hidelogo = !state.hidelogo; e.currentTarget.classList.toggle('on', state.hidelogo); render(); };
  document.getElementById('fit').onclick = (e) => { state.cover = !state.cover; document.body.classList.toggle('cover', state.cover); e.currentTarget.classList.toggle('on', state.cover); };
  function goFullscreen() {
    const wrap = document.getElementById('stagewrap');
    const vid = stage.querySelector('video');   // the WebRTC/MSE inner <video>, if any
    // iOS Safari can't fullscreen a <div>/<img> — only a <video> via webkitEnterFullscreen.
    if (!document.fullscreenEnabled && vid && vid.webkitEnterFullscreen) { vid.webkitEnterFullscreen(); return; }
    if (wrap.requestFullscreen) { wrap.requestFullscreen().catch(() => { if (vid && vid.webkitEnterFullscreen) vid.webkitEnterFullscreen(); }); }
    else if (wrap.webkitRequestFullscreen) { wrap.webkitRequestFullscreen(); }
    else if (vid && vid.webkitEnterFullscreen) { vid.webkitEnterFullscreen(); }
  }
  document.getElementById('full').onclick = goFullscreen;
  function updateBadge(){ badge.textContent = `${state.mode==='rtc'?'WebRTC':'MJPEG'} · ${state.q.toUpperCase()}` + (state.rot?` · ${state.rot}°`:'') + (state.mirror?' · mir':'') + (state.hidelogo?' · no-YI':''); }

  // adjust panel
  document.getElementById('adjbtn').onclick = (e) => { document.getElementById('adjust').classList.toggle('open'); e.currentTarget.classList.toggle('on'); };
  const pct = (v) => Math.round(v*100)+'%';
  function bindSlider(id, key, label, fmt) {
    const inp = document.getElementById(id), out = document.getElementById(label);
    inp.oninput = () => { state[key] = parseFloat(inp.value); out.textContent = fmt(state[key]); applyCss(); };
  }
  bindSlider('b','b','bV', pct); bindSlider('c','c','cV', pct); bindSlider('s','s','sV', pct);
  bindSlider('hue','hue','hV', v => Math.round(v)+'°');
  document.getElementById('resetadj').onclick = () => {
    state.b=state.c=state.s=1; state.hue=0;
    for (const [id,val,lbl,txt] of [['b',1,'bV','100%'],['c',1,'cV','100%'],['s',1,'sV','100%'],['hue',0,'hV','0°']]) {
      document.getElementById(id).value = val; document.getElementById(lbl).textContent = txt;
    }
    applyCss();
  };

  // ---- tabs: Live / People ----
  let tab = 'live', prange = 'hour', peopleTimer = null;
  const liveView = document.getElementById('liveview');
  const peopleView = document.getElementById('peopleview');
  document.querySelectorAll('.tabs button').forEach(b => b.onclick = () => setTab(b.dataset.tab));
  function setTab(t) {
    tab = t;
    document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('on', b.dataset.tab === t));
    liveView.hidden = t !== 'live';
    peopleView.hidden = t !== 'people';
    if (t === 'live') { stopPeople(); render(); }               // resume the stream
    else { clearInterval(rtcTimer); rtcTimer = null; stage.innerHTML = ''; startPeople(); } // stop stream, save CPU/bandwidth
  }
  function startPeople() { loadNow(); loadSeries(); loadStatus(); clearInterval(peopleTimer); peopleTimer = setInterval(() => { loadNow(); loadSeries(); loadStatus(); }, 5000); }
  function stopPeople() { clearInterval(peopleTimer); peopleTimer = null; }
  function loadNow() {
    fetch('/api/occupancy/now').then(r => r.json()).then(d => {
      const el = document.getElementById('pcount');
      el.textContent = d.count == null ? '–' : d.count;
      el.classList.toggle('live', d.count > 0);
    }).catch(() => {});
  }
  document.querySelectorAll('.rbtn').forEach(b => b.onclick = () => {
    prange = b.dataset.range;
    document.querySelectorAll('.rbtn').forEach(x => x.classList.toggle('on', x === b));
    loadSeries();
  });
  // detection engine: the server does the detecting, so this just tells it which to use
  const ebtns = document.querySelectorAll('.ebtn');
  const enote = document.getElementById('enote');
  const markEngine = (name) => ebtns.forEach(b => b.classList.toggle('on', b.dataset.engine === name));
  function loadStatus() {
    fetch('/api/occupancy/status').then(r => r.json()).then(d => {
      if (d.detector) markEngine(d.detector);
      if (!enote.dataset.busy) enote.textContent = d.lastErr ? d.lastErr : (d.backend || '');
    }).catch(() => {});
  }
  ebtns.forEach(b => b.onclick = () => {
    if (b.classList.contains('on')) return;
    ebtns.forEach(x => x.disabled = true);
    enote.dataset.busy = '1';
    enote.textContent = `switching to ${b.textContent}…`;   // first switch loads the model
    fetch('/api/occupancy/detector/' + b.dataset.engine, { method: 'POST' })
      .then(r => r.json().then(d => { if (!r.ok) throw new Error(d.error || 'switch failed'); return d; }))
      .then(d => { markEngine(d.detector); enote.textContent = d.backend || ''; loadNow(); loadSeries(); })
      .catch(e => { enote.textContent = e.message; })
      .finally(() => { delete enote.dataset.busy; ebtns.forEach(x => x.disabled = false); });
  });
  function loadSeries() {
    fetch(`/api/occupancy?range=${prange}`).then(r => r.json()).then(d => {
      document.getElementById('ppeak').textContent = d.peak == null ? '–' : d.peak;
      document.getElementById('pavg').textContent = d.avg == null ? '–' : d.avg;
      document.getElementById('psamples').textContent = d.samples || 0;
      drawChart(d);
    }).catch(() => {});
  }
  // hand-rolled SVG chart: peak people per time bucket (no external chart lib)
  function drawChart(d) {
    const host = document.getElementById('chart');
    const pts = d.points || [];
    const W = 820, H = 260, padL = 32, padR = 12, padT = 12, padB = 26;
    if (!pts.length) { host.innerHTML = `<svg viewBox="0 0 ${W} ${H}"><text x="${W/2}" y="${H/2}" fill="#8b95a3" text-anchor="middle" font-size="14">no data yet — detecting…</text></svg>`; return; }
    const t0 = d.since, t1 = d.now, ymax = Math.max(1, d.peak || 1);
    const X = t => padL + (W - padL - padR) * (t - t0) / (t1 - t0 || 1);
    const Y = v => padT + (H - padT - padB) * (1 - v / ymax);
    let area = `M ${X(pts[0].t).toFixed(1)} ${Y(0).toFixed(1)}`;
    pts.forEach(p => area += ` L ${X(p.t).toFixed(1)} ${Y(p.mx).toFixed(1)}`);
    area += ` L ${X(pts[pts.length - 1].t).toFixed(1)} ${Y(0).toFixed(1)} Z`;
    const line = pts.map((p, i) => `${i ? 'L' : 'M'} ${X(p.t).toFixed(1)} ${Y(p.mx).toFixed(1)}`).join(' ');
    const step = Math.max(1, Math.ceil(ymax / 5));
    let grid = '', yl = '';
    for (let v = 0; v <= ymax; v += step) { grid += `<line x1="${padL}" y1="${Y(v).toFixed(1)}" x2="${W - padR}" y2="${Y(v).toFixed(1)}" stroke="#262b33"/>`; yl += `<text x="${padL - 6}" y="${(Y(v) + 4).toFixed(1)}" fill="#8b95a3" font-size="11" text-anchor="end">${v}</text>`; }
    const fmt = ts => { const t = new Date(ts); return d.range === 'week' ? (t.getMonth() + 1) + '/' + t.getDate() : t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); };
    let xl = ''; const N = 5;
    for (let i = 0; i <= N; i++) { const ts = t0 + (t1 - t0) * i / N; xl += `<text x="${X(ts).toFixed(1)}" y="${H - 8}" fill="#8b95a3" font-size="11" text-anchor="${i === 0 ? 'start' : i === N ? 'end' : 'middle'}">${fmt(ts)}</text>`; }
    host.innerHTML = `<svg viewBox="0 0 ${W} ${H}">${grid}<path d="${area}" fill="rgba(61,162,255,.18)"/><path d="${line}" fill="none" stroke="#3da2ff" stroke-width="2"/>${yl}${xl}</svg>`;
  }

  fetch('/api/info').then(r=>r.json()).then(d=>{ go2rtcPort = d.go2rtcPort || 1984; document.getElementById('meta').textContent = d.camera; render(); }).catch(render);
</script>
</body>
</html>
